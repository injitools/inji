name: npm maintenance

# One-off registry surgery (unpublish / deprecate), run by hand.
#
# Why a workflow instead of running npm locally: writes to the registry demand a TOTP code when the
# account has 2FA, and a security key cannot produce one. The NPM_INJITOOLS_TOKEN used for releases
# is an automation token, which bypasses 2FA — so the work happens here and the token never leaves
# GitHub.
#
# UNPUBLISH IS PERMANENT: the version disappears and its number can never be published again.
# Anyone whose lockfile pins it gets a hard 404 until they move. That is the point when the version
# being removed is unsafe, but there is no undo — hence the explicit confirm input.
#
# It also mostly does not work here, by npm policy: a version cannot be unpublished while anything
# in the registry depends on the PACKAGE (the check is package-wide, not per-version), and these
# packages depend on each other — contract <- core <- db <- auth. The current 0.2.1 releases
# therefore pin their own parents in place forever. Only the leaves (auth, cli) could be removed.
# The 72-hour window does NOT bypass this: both criteria must hold.
# See https://docs.npmjs.com/policies/unpublish — deprecate is the supported path; a support
# ticket is the only exception route.

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        type: choice
        options: [deprecate, unpublish]
        required: true
      versions:
        description: "Space-separated exact versions, e.g. '0.1.0 0.2.0'"
        required: true
      message:
        description: "Deprecation message (ignored for unpublish)"
        required: false
        default: "Upgrade to >=0.2.1"
      confirm:
        description: "Type UNPUBLISH to allow an unpublish. Ignored for deprecate."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Guard the unpublish
        if: inputs.action == 'unpublish' && inputs.confirm != 'UNPUBLISH'
        run: |
          echo "::error::unpublish is permanent — re-run with confirm=UNPUBLISH to proceed."
          exit 1

      - name: Apply
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_INJITOOLS_TOKEN }}
        run: |
          set -uo pipefail
          fail=0
          # Reverse dependency order (contract <- core <- db <- auth; cli is standalone).
          # npm refuses to unpublish a version while something in the registry still depends on it,
          # and these packages depend on each other — so the leaves have to go first, otherwise
          # every parent is rejected with E405 "has dependent packages in the registry".
          for pkg in cli auth db core contract; do
            name="@injitools/$pkg"
            for ver in ${{ inputs.versions }}; do
              spec="$name@$ver"
              if ! npm view "$spec" version >/dev/null 2>&1; then
                echo "· $spec — not on the registry, skipping"
                continue
              fi
              if [ "${{ inputs.action }}" = "unpublish" ]; then
                echo "→ unpublishing $spec"
                # NO --force. It is not needed to remove a single version, and combined with one it
                # has been reported to ignore the version and unpublish the WHOLE package
                # (npm/cli#7015) — which here would take the live 0.2.1 with it.
                npm unpublish "$spec" || fail=1
              else
                echo "→ deprecating $spec"
                npm deprecate "$spec" "${{ inputs.message }}" || fail=1
              fi
            done
          done
          exit $fail

      # always(): the point of this step is to show the real state, and that matters most when the
      # apply above failed partway — the first run left auth/cli unpublished and the rest intact.
      - name: Read the registry back
        if: always()
        run: |
          echo "=== remaining versions ==="
          for pkg in contract core db auth cli; do
            printf '%-10s ' "$pkg"
            npm view "@injitools/$pkg" versions --json 2>/dev/null | tr -d '\n[] "' || echo "(gone)"
            echo
          done
