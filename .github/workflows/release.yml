name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_INJITOOLS_TOKEN }}
        run: |
          set -euo pipefail
          for pkg in contract core db auth cli; do
            name="@injitools/$pkg"
            ver="$(node -p "require('./packages/$pkg/package.json').version")"
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "→ $name@$ver already published, skipping"
            else
              echo "→ publishing $name@$ver"
              npm publish --workspace "$name" --access public --provenance
            fi
          done
